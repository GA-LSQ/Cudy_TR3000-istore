name: ImmortalWrt Builder

permissions:
  contents: write

on:
  repository_dispatch:
    types: [ "Source Code Update" ]
  workflow_dispatch:
    inputs:
      # 删除了 device 选项，不再需要
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/padavanonly/immortalwrt-mt798x-6.6'
        
      version: 
        description: '指定版本进行编译'
        required: true
        type: choice
        default: ''
        options:
          - master
          - openwrt-24.10-6.6
          - 24.10.5
          - v24.10.4
          - v24.10.5
          - v24.10.6
          - v24.10.7
          - v25.12.0
          - v25.12.1
          - v25.12.2
          - v25.12.3
          - v25.12.4
          - v25.12.5
          - v25.12.6
          - v25.12.7
      commit:
        description: '指定源码commit（必须对应版本号）'
        required: false
        type: string
        default: ''
      ssh:
        description: '是否执行 make menuconfig'
        required: false
        type: boolean
        default: false
      release:
        description: '是否发布到 Release'
        required: false
        type: boolean
        default: true
      prerelease:
        description: '是否发布为预发布版本'
        required: false
        type: boolean
        default: false

env:
  # 固定配置文件路径（假设 im.config 放在仓库根目录）
  CONFIG_FILE: im.config
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo }}
  REPO_BRANCH: ${{ github.event.inputs.version }}
  REPO_COMMIT: ${{ github.event.inputs.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release }}
  PRERELEASE: ${{ github.event.inputs.prerelease }}
  TZ: Asia/Shanghai

jobs:
  menuconfig:
    name: ⚙️ Menuconfig & Push
    if: github.event.inputs.ssh == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Init Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libncurses-dev build-essential git wget python3 bzip2
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 👩‍💻 Copy previous config if exists
        run: |
          if [ -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" ]; then
            cp -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" /workdir/openwrt/.config
          fi

      - name: ⚙️ Load custom feeds & diy-part1
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 🧬 Update & Install feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 🧩 Load diy-part2 & config
        run: |
          # 再次确保配置文件存在（可能被 diy-part1 修改？）
          cp -f $GITHUB_WORKSPACE/${CONFIG_FILE} openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: ⌨️ SSH connection to Menuconfig
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 40
          
      - name: 📤 Push config to main branch
        run: |
          SRC="/workdir/openwrt/.config"
          DST="$GITHUB_WORKSPACE/${CONFIG_FILE}"
          cp -f "$SRC" "$DST"
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CONFIG_FILE"
          
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          
          git diff --cached --quiet || (
            git commit -m "Update config: ${CONFIG_FILE}" || true
            git pull --rebase origin $CURRENT_BRANCH
            git push origin HEAD:$CURRENT_BRANCH   # 去掉 -f 避免覆盖
          )

  build:
    name: 🔨 Build Firmware
    needs: menuconfig
    if: always() && (needs.menuconfig.result == 'success' || needs.menuconfig.result == 'skipped')
    runs-on: ubuntu-22.04
    
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4

      - name: 🪠 Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 🛠️ Init Environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: ⚙️ Setup ccache & DL cache
        uses: actions/cache@v4
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-${{ hashFiles('im.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-combined-${{ env.REPO_BRANCH }}-

      - name: 🔧 Configure ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z

      - name: 🧬 Update & Install feeds
        run: |
          cd openwrt
          [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && mv $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 🔨 Single Device Compilation
        id: compile
        run: |
          cd /workdir/openwrt
          
          # 复制固定配置文件
          cp -f $GITHUB_WORKSPACE/${CONFIG_FILE} .config
          
          make defconfig
          make download -j$(nproc)
          
          # 编译（使用 ccache 环境变量而非直接覆盖 CC）
          export PATH="/usr/lib/ccache:$PATH"
          if ! make -j$(nproc); then
            echo "⚠️ Multi-threaded failed, retrying single-threaded with verbose..."
            make -j1 V=s || exit 1
          fi

          echo "✅ Build finished."
          
          # 收集固件
          mkdir -p $GITHUB_WORKSPACE/firmware
          find bin/targets/ -name "*sysupgrade.bin" -exec cp {} $GITHUB_WORKSPACE/firmware/ \;
          
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 🪄 Upload Binaries (Artifacts)
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt_${{ env.REPO_BRANCH }}
          path: ${{ github.workspace }}/firmware/*

      - name: 📌 Generate Release Tag
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="ImmortalWrt-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          cat > release.txt << EOF
          ## 📦 ImmortalWrt Firmware Release

          **🏷️ Release:** $RELEASE_TAG
          **🌿 Branch:** $REPO_BRANCH
          **📅 Build Date:** $(date +"%Y-%m-%d %H:%M:%S")
          **📄 Config:** ${CONFIG_FILE}
          **🔨 Compiler:** GCC with ccache

          ## 📥 Download

          Download the firmware files from the assets below.

          Built with ❤️ using GitHub Actions
          EOF

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 📤 Upload to Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: ${{ github.workspace }}/firmware/*

      - name: 🚧 Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 9
